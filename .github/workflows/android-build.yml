name: Android Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: 📂 Setup Node
        uses: actions/setup-node@v4
        with:
            node-version: 20
            cache: 'npm'
            cache-dependency-path: mobile/package-lock.json

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📦 Install dependencies
        working-directory: ./mobile
        run: npm ci

      - name: 📝 Setup Firebase Config
        working-directory: ./mobile
        shell: bash
        env:
          FIREBASE_CONFIG: ${{ secrets.MOBILE_FIREBASE_CONFIG }}
        run: |
          echo "$FIREBASE_CONFIG" > firebaseConfig.ts

      - name: 🛠 Prebuild Android
        working-directory: ./mobile
        run: npx expo prebuild --platform android

      - name: 🔑 Decode Keystore
        working-directory: ./mobile/android/app
        run: echo "${{ secrets.ANDROID_KEYSTORE_FILE }}" | base64 --decode > release.jks

      - name: 🚀 Build APK
        working-directory: ./mobile/android
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/mobile/android/app/release.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: mobile/android/app/build/outputs/apk/release/*.apk
